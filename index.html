<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHIM.SCHEDULE | 專屬日程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;500;700;900&family=Noto+Sans+HK:wght@400;500;700;900&family=Noto+Serif+HK:wght@400;700;900&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans HK"', 'sans-serif'],
                        serif: ['"Noto Serif HK"', 'serif'],
                        cute: ['"M PLUS Rounded 1c"', 'sans-serif'],
                        calligraphy: ['"Zhi Mang Xing"', 'cursive'],
                        wenkai: ['"LXGW WenKai TC"', 'sans-serif'],
                    },
                    colors: {
                        appbg: '#F2F2F7', 
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: font-family 0.3s ease, background-color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .modal-enter { opacity: 0; transform: translateY(20px) scale(0.95); }
        .modal-enter-active { opacity: 1; transform: translateY(0) scale(1); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .agenda-card { transition: all 0.5s ease; }
        .card-indicator { transition: background-color 0.5s ease; }
    </style>
</head>
<body class="antialiased selection:bg-zinc-200 min-h-screen flex flex-col font-sans bg-appbg" id="app-body">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-appbg/70 backdrop-blur-xl border-b border-zinc-200/50 w-full transition-colors" id="app-header">
        <div class="flex justify-between items-center px-6 py-4 max-w-2xl mx-auto w-full">
            <h1 class="text-xl font-black tracking-tight text-zinc-900">
                CHIM<span class="font-medium text-zinc-500">.APP</span>
            </h1>
            <div class="flex items-center gap-1.5 bg-white px-2 py-1.5 rounded-full shadow-sm border border-zinc-100">
                <button onclick="openDashboard()" class="text-zinc-400 hover:text-zinc-900 transition-colors p-1.5 rounded-full" title="全螢幕動態看板">
                    <i data-lucide="monitor-play" class="w-4 h-4"></i>
                </button>
                <div class="w-px h-4 bg-zinc-200 mx-1"></div>
                <button onclick="openSettingsModal()" class="text-zinc-400 hover:text-zinc-900 transition-colors p-1.5 rounded-full" title="個性化設定">
                    <i data-lucide="palette" class="w-4 h-4"></i>
                </button>
                <div class="w-px h-4 bg-zinc-200 mx-1"></div>
                <div id="auth-container"></div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-2xl mx-auto px-5 py-6 pb-32 w-full flex-1 flex flex-col gap-8">
        
        <section id="agenda-section" class="w-full">
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="flex items-center gap-3">
                    <h2 id="agenda-title" class="text-2xl font-bold tracking-tight text-zinc-900">即將到來</h2>
                    <button onclick="goToToday()" class="px-3 py-1 bg-zinc-100 hover:bg-zinc-200 text-zinc-600 rounded-full text-xs font-bold transition-colors shadow-sm">今日</button>
                </div>
                <button id="show-all-btn" class="hidden px-3 py-1 bg-zinc-200/50 hover:bg-zinc-200 text-zinc-600 rounded-full text-xs font-bold transition-colors" onclick="clearDateSelection()">
                    顯示全部
                </button>
            </div>
            <p id="agenda-subtitle" class="text-zinc-500 text-sm font-medium px-2 mb-6 hidden">依時間順序排列的未來安排</p>
            
            <div id="agenda-list" class="space-y-6">
                <!-- Agenda items -->
            </div>
        </section>

        <section id="calendar-section" class="w-full">
            <div class="bg-white rounded-[2rem] p-6 shadow-[0_2px_20px_-4px_rgba(0,0,0,0.04)] border border-zinc-100/80">
                <div class="flex justify-between items-center mb-5">
                    <h2 id="calendar-month-title" class="text-xl font-bold tracking-tight text-zinc-900">
                        <!-- Title -->
                    </h2>
                    <div class="flex items-center gap-2">
                        <button onclick="goToToday()" class="px-3 py-1.5 bg-zinc-100 hover:bg-zinc-200 text-zinc-600 rounded-full text-xs font-bold transition-all shadow-sm">今日</button>
                        <div class="flex gap-1 bg-zinc-50 rounded-full p-1">
                            <button onclick="changeMonth(-1)" class="p-1.5 text-zinc-500 hover:text-zinc-900 hover:bg-white rounded-full transition-all">
                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                            </button>
                            <button onclick="changeMonth(1)" class="p-1.5 text-zinc-500 hover:text-zinc-900 hover:bg-white rounded-full transition-all">
                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="calendar-grid" class="grid grid-cols-7 gap-y-3 gap-x-1 text-center text-sm">
                    <!-- Grid -->
                </div>

                <div class="mt-5 pt-4 border-t border-zinc-50 flex items-center justify-center gap-4 text-[11px] font-bold text-zinc-400">
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-emerald-400"></div>1項</div>
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-amber-400"></div>2項</div>
                    <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-rose-400"></div>3項+</div>
                </div>
            </div>
        </section>

    </main>

    <!-- FAB -->
    <div id="fab-container" class="hidden fixed bottom-8 left-0 right-0 pointer-events-none z-40 justify-center">
        <button onclick="openAddModal()" class="pointer-events-auto flex items-center gap-2 px-6 py-3.5 bg-zinc-900/90 backdrop-blur-md text-white rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.2)] hover:bg-zinc-800 hover:scale-105 transition-all duration-300">
            <i data-lucide="plus" class="w-5 h-5"></i>
            <span class="font-bold text-sm tracking-wide">新增日程</span>
        </button>
    </div>

    <!-- Modals Overlay -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm hidden opacity-0 transition-opacity duration-400">
        
        <!-- Admin Modal (管理中心) -->
        <div id="admin-modal" class="hidden bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform translate-y-8 scale-95 transition-all duration-400">
            <div class="flex flex-col max-h-[80vh]">
                <div class="flex justify-between items-center p-6 pb-4 border-b border-zinc-100 shrink-0">
                    <h3 class="text-lg font-bold text-zinc-900 tracking-tight flex items-center gap-2">
                        <i data-lucide="shield-alert" class="w-5 h-5 text-emerald-500"></i> 管理中心
                    </h3>
                    <button onclick="closeModals()" class="bg-zinc-100 text-zinc-500 hover:bg-zinc-200 p-2 rounded-full transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto space-y-6 grow hide-scrollbar bg-white">
                    
                    <div class="bg-zinc-50 p-4 rounded-[1.5rem] border border-zinc-100 text-center">
                        <p class="text-xs text-zinc-500 font-bold mb-3">一鍵清理過去的活動記錄，保持系統整潔</p>
                        <button onclick="clearEndedEvents()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-100 transition-colors text-sm font-bold flex justify-center items-center gap-2 shadow-sm">
                            <i data-lucide="trash-2" class="w-4 h-4"></i> 清除所有已結束排程
                        </button>
                    </div>

                    <div>
                        <h4 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3 ml-1">所有排程列表</h4>
                        <div class="space-y-3" id="admin-event-list">
                            <!-- Admin list injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform translate-y-8 scale-95 transition-all duration-400">
            <div class="flex justify-between items-center p-6 pb-2">
                <h3 class="text-lg font-bold text-zinc-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="settings-2" class="w-5 h-5 text-zinc-400"></i> App 設定
                </h3>
                <button onclick="closeModals()" class="bg-zinc-100 text-zinc-500 hover:bg-zinc-200 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="p-6 space-y-6">
                <div>
                    <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3 ml-1">字體風格</label>
                    <div class="space-y-2 bg-zinc-50 p-2 rounded-2xl border border-zinc-100">
                        <button onclick="applyFont('sans')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-white hover:shadow-sm transition-all font-sans">
                            <span class="text-sm font-bold text-zinc-800">現代黑體 (App 預設)</span>
                            <i data-lucide="check-circle-2" class="w-5 h-5 text-zinc-900 hidden font-check-icon" id="check-sans"></i>
                        </button>
                        <button onclick="applyFont('serif')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-white hover:shadow-sm transition-all font-serif">
                            <span class="text-sm font-bold text-zinc-800">優雅明體 (傳統)</span>
                            <i data-lucide="check-circle-2" class="w-5 h-5 text-zinc-900 hidden font-check-icon" id="check-serif"></i>
                        </button>
                        <button onclick="applyFont('wenkai')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-white hover:shadow-sm transition-all font-wenkai">
                            <span class="text-sm font-bold text-zinc-800">霞鶩文楷 (書卷)</span>
                            <i data-lucide="check-circle-2" class="w-5 h-5 text-zinc-900 hidden font-check-icon" id="check-wenkai"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3 ml-1">App 佈景主題</label>
                    <div class="flex gap-3 justify-center bg-zinc-50 p-4 rounded-2xl border border-zinc-100">
                        <button onclick="applyBgColor('#F2F2F7', 'bg-appbg/70')" class="w-10 h-10 rounded-full border border-zinc-200 bg-[#F2F2F7] hover:scale-110 transition-all flex items-center justify-center bg-check-btn" id="bg-btn-#F2F2F7" title="iOS 原生灰">
                            <div class="w-3 h-3 rounded-full bg-zinc-900 hidden bg-check-icon"></div>
                        </button>
                        <button onclick="applyBgColor('#FDF8F5', 'bg-[#FDF8F5]/70')" class="w-10 h-10 rounded-full border border-zinc-200 bg-[#FDF8F5] hover:scale-110 transition-all flex items-center justify-center bg-check-btn" id="bg-btn-#FDF8F5" title="奶茶米色">
                            <div class="w-3 h-3 rounded-full bg-zinc-900 hidden bg-check-icon"></div>
                        </button>
                        <button onclick="applyBgColor('#F0F4F8', 'bg-[#F0F4F8]/70')" class="w-10 h-10 rounded-full border border-zinc-200 bg-[#F0F4F8] hover:scale-110 transition-all flex items-center justify-center bg-check-btn" id="bg-btn-#F0F4F8" title="科技藍灰">
                            <div class="w-3 h-3 rounded-full bg-zinc-900 hidden bg-check-icon"></div>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Modal -->
        <div id="add-modal" class="hidden bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform translate-y-8 scale-95 transition-all duration-400">
            <div class="flex justify-between items-center p-6 pb-2 border-b border-zinc-50">
                <h3 class="text-lg font-bold text-zinc-900 tracking-tight">新增排程</h3>
                <button onclick="closeModals()" class="bg-zinc-100 text-zinc-500 hover:bg-zinc-200 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="add-form" onsubmit="handleAddEvent(event)" class="space-y-4">
                    <div class="bg-zinc-50 p-2 rounded-2xl border border-zinc-100">
                        <input id="f-title" required type="text" class="w-full px-4 py-3 text-base bg-transparent focus:outline-none text-zinc-900 placeholder:text-zinc-400 font-bold" placeholder="準備做些什麼？">
                    </div>
                    <div class="bg-zinc-50 p-1 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden">
                        <div class="bg-white p-2.5 rounded-xl ml-1 shadow-sm"><i data-lucide="calendar" class="text-zinc-500 w-4 h-4"></i></div>
                        <input id="f-date" required type="date" class="w-full pl-3 pr-2 py-3 text-sm bg-transparent focus:outline-none text-zinc-900 font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-zinc-50 p-1 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden">
                            <div class="bg-white p-2.5 rounded-xl ml-1 shadow-sm text-zinc-500 text-[10px] font-bold text-center w-9 h-9 flex items-center justify-center leading-none">開始</div>
                            <input id="f-time" required type="time" class="w-full pl-2 pr-2 py-3 text-sm bg-transparent focus:outline-none text-zinc-900 font-bold">
                        </div>
                        <div class="bg-zinc-50 p-1 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden">
                            <div class="bg-white p-2.5 rounded-xl ml-1 shadow-sm text-zinc-500 text-[10px] font-bold text-center w-9 h-9 flex items-center justify-center leading-none">完結</div>
                            <input id="f-endtime" type="time" class="w-full pl-2 pr-2 py-3 text-sm bg-transparent focus:outline-none text-zinc-900 font-bold">
                            <div id="f-endtime-tbd-overlay" class="absolute inset-0 bg-zinc-50/90 backdrop-blur-md flex items-center justify-center cursor-pointer hidden" onclick="toggleTBD()">
                                <span class="text-sm font-bold text-zinc-500 tracking-wider">暫未確定</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end mt-[-8px]">
                        <button type="button" onclick="toggleTBD()" class="text-[10px] bg-zinc-100 hover:bg-zinc-200 text-zinc-500 font-bold px-2.5 py-1.5 rounded-lg transition-colors">
                            設定為「暫未確定」完結
                        </button>
                    </div>
                    <div class="bg-zinc-50 p-2 rounded-2xl border border-zinc-100">
                        <textarea id="f-desc" rows="3" class="w-full px-4 py-2 text-sm bg-transparent focus:outline-none text-zinc-900 placeholder:text-zinc-400 resize-none font-medium" placeholder="備註細節..."></textarea>
                    </div>
                    <div class="pt-4">
                        <button type="submit" class="w-full py-4 text-sm font-bold text-white bg-zinc-900 rounded-2xl hover:bg-zinc-800 transition-colors shadow-lg shadow-zinc-900/20 active:scale-[0.98]">確認建立</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Alert Modal -->
        <div id="alert-modal" class="hidden bg-white rounded-[2rem] shadow-2xl w-full max-w-xs overflow-hidden transform translate-y-8 scale-95 transition-all duration-400 z-[110]">
            <div class="flex flex-col items-center text-center p-8">
                <div class="w-12 h-12 bg-zinc-100 rounded-full flex items-center justify-center mb-4">
                    <i data-lucide="info" class="text-zinc-900 w-6 h-6"></i>
                </div>
                <p id="alert-msg" class="text-zinc-800 text-sm mb-8 font-bold leading-relaxed">訊息內容</p>
                <button onclick="closeAlertModal()" class="w-full py-3.5 bg-zinc-100 text-zinc-900 rounded-2xl hover:bg-zinc-200 transition-colors text-sm font-bold">我知道了</button>
            </div>
        </div>

        <!-- Detail Modal -->
        <div id="detail-modal" class="hidden bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform translate-y-8 scale-95 transition-all duration-400">
            <div class="p-8 md:p-10 relative flex flex-col items-center text-center">
                <button onclick="closeModals()" class="absolute top-6 right-6 text-zinc-300 hover:text-zinc-900 bg-zinc-50 hover:bg-zinc-100 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>

                <div class="w-full mt-4">
                    <p class="text-[11px] font-bold text-zinc-400 uppercase tracking-[0.2em] mb-4" id="detail-date">日期</p>
                    <h3 class="text-3xl font-black text-zinc-900 tracking-tight leading-snug mb-2" id="detail-title">標題</h3>
                    <p class="text-base font-bold text-zinc-500 tracking-wide mb-8 tabular-nums" id="detail-time">時間</p>
                </div>

                <div id="detail-desc-container" class="w-full mb-2 hidden flex-col items-center">
                    <div class="w-8 h-1 bg-zinc-100 rounded-full mb-6"></div>
                    <p class="text-zinc-600 text-sm font-medium leading-relaxed whitespace-pre-wrap" id="detail-desc">詳細內容</p>
                </div>

                <div class="w-full mt-8">
                    <button onclick="closeModals()" class="w-full py-3.5 bg-zinc-50 text-zinc-900 rounded-2xl hover:bg-zinc-100 transition-colors text-sm font-bold">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Overlay (全螢幕看板) -->
    <div id="dashboard-overlay" class="fixed inset-0 z-[100] bg-zinc-950 text-white hidden opacity-0 transition-opacity duration-500 font-sans">
        <div class="absolute top-8 left-8 md:top-12 md:left-12 flex flex-col items-start z-10 pointer-events-none">
            <div class="text-zinc-400 font-bold tracking-[0.2em] text-xs md:text-sm uppercase mb-1" id="dash-current-date">--</div>
            <div class="text-zinc-500 font-bold tracking-widest text-base md:text-xl tabular-nums" id="dash-current-time">--:--:--</div>
        </div>

        <div class="absolute top-8 right-8 md:top-12 md:right-12 flex gap-3 z-20">
            <button onclick="toggleOrientation()" class="text-zinc-400 hover:text-white transition-colors p-3 bg-zinc-900 hover:bg-zinc-800 rounded-full shadow-lg" title="強制旋轉螢幕">
                <i data-lucide="smartphone-charging" class="w-5 h-5 md:w-6 md:h-6"></i>
            </button>
            <button onclick="closeDashboard()" class="text-zinc-400 hover:text-white transition-colors p-3 bg-zinc-900 hover:bg-zinc-800 rounded-full shadow-lg" title="離開看板">
                <i data-lucide="shrink" class="w-5 h-5 md:w-6 md:h-6"></i>
            </button>
        </div>

        <div class="w-full h-full flex flex-col items-center justify-center text-center px-6 z-10 pointer-events-none">
            <p id="dash-status-label" class="text-zinc-400 font-bold mb-4 md:mb-6 tracking-[0.3em] uppercase text-xs border border-zinc-800 px-4 py-1.5 rounded-full">加載中</p>
            <h2 id="dash-main-title" class="text-4xl md:text-6xl lg:text-7xl font-black tracking-tight mb-6 md:mb-10 leading-tight max-w-4xl px-4">--</h2>
            
            <div id="dash-countdown" class="text-6xl md:text-8xl lg:text-[10rem] font-black tracking-widest tabular-nums leading-none text-zinc-100 drop-shadow-[0_0_40px_rgba(255,255,255,0.1)]">
                --:--:--
            </div>
            
            <p id="dash-main-time" class="text-zinc-500 font-bold mt-6 md:mt-10 text-lg md:text-xl tracking-wide tabular-nums">--</p>
        </div>

        <div class="absolute bottom-8 right-8 md:bottom-12 md:right-12 flex flex-col items-end text-right z-10 pointer-events-none max-w-[200px] md:max-w-xs">
            <p class="text-zinc-600 text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] mb-1.5 flex items-center gap-1.5">
                <i data-lucide="arrow-right-circle" class="w-3.5 h-3.5"></i> 隨後安排
            </p>
            <p id="dash-next-title" class="text-zinc-300 font-bold text-sm md:text-base truncate w-full">無後續活動</p>
            <p id="dash-next-time" class="text-zinc-500 font-bold text-xs md:text-sm mt-0.5 w-full tabular-nums">--</p>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBW95yx0j_bvxWjuZSB6On3bADoBu3wxnA",
            authDomain: "calendar-61298.firebaseapp.com",
            projectId: "calendar-61298",
            storageBucket: "calendar-61298.firebasestorage.app",

        let isAdmin = false; 
        let currentMonthDate = new Date();
        let selectedDateStr = null;
        let currentFont = localStorage.getItem('chim_app_font') || 'sans'; 
        let currentBgColor = localStorage.getItem('chim_app_bg') || '#F2F2F7';
        let currentHeaderColor = localStorage.getItem('chim_app_header') || 'bg-appbg/70';
        
        let events = [];
        let unsubscribeSnapshot = null;
        
        let dashboardInterval = null;

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function getTomorrowDate() { const tmr = new Date(); tmr.setDate(tmr.getDate() + 1); return formatDate(tmr); }
        function isToday(dateStr) { return formatDate(new Date()) === dateStr; }
        function formatAMPM(timeStr) {
            if (!timeStr) return '';
            const [hourStr, minuteStr] = timeStr.split(':');
            let hour = parseInt(hourStr, 10);
            const ampm = hour >= 12 ? '下午' : '上午';
            hour = hour % 12; hour = hour ? hour : 12; 
            return `${ampm} ${hour}:${minuteStr}`;
        }

        function formatDiffShort(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            if(totalSeconds <= 0) return "00:00";
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');
            if (hours > 0) return `${h}:${m}:${s}`;
            return `${m}:${s}`;
        }

        function renderCalendar() {
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            document.getElementById('calendar-month-title').innerText = 
                currentMonthDate.toLocaleString('zh-TW', { month: 'long', year: 'numeric' });

            const grid = document.getElementById('calendar-grid');
            let html = '';

            ['日', '一', '二', '三', '四', '五', '六'].forEach(day => {
                html += `<div class="text-zinc-400 font-bold text-xs py-2">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) { html += `<div></div>`; }

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = formatDate(new Date(year, month, i));
                const count = events.filter(e => e.date === dateStr).length;
                
                let colorClass = 'text-zinc-700 font-bold hover:bg-zinc-100';
                if (count === 1) colorClass = 'bg-emerald-100 text-emerald-800 font-bold';
                if (count === 2) colorClass = 'bg-amber-100 text-amber-800 font-bold';
                if (count >= 3) colorClass = 'bg-rose-500 text-white font-bold shadow-md shadow-rose-500/20';

                const isSelected = selectedDateStr === dateStr;
                const selectedClass = isSelected ? 'ring-2 ring-offset-2 ring-zinc-900 scale-110 shadow-md' : '';
                const todayClass = (isToday(dateStr) && !isSelected && count === 0) ? 'border border-zinc-200' : '';

                html += `
                    <button onclick="selectDate('${dateStr}')" class="w-9 h-9 mx-auto rounded-full flex items-center justify-center transition-all duration-300 ${colorClass} ${selectedClass} ${todayClass}">
                        ${i}
                    </button>
                `;
            }
            grid.innerHTML = html;
        }

        function renderAgenda() {
            const listContainer = document.getElementById('agenda-list');
            const showAllBtn = document.getElementById('show-all-btn');
            const titleEl = document.getElementById('agenda-title');
            
            const sortedEvents = [...events].sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            let html = '';

            if (selectedDateStr) {
                const d = new Date(selectedDateStr);
                titleEl.innerText = d.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
                showAllBtn.classList.remove('hidden');
                html += renderDayGroup(selectedDateStr, sortedEvents.filter(e => e.date === selectedDateStr));
            } else {
                titleEl.innerText = '近期安排';
                showAllBtn.classList.add('hidden');
                
                const todayStr = formatDate(new Date());
                const tomorrowStr = getTomorrowDate();
                
                html += renderDayGroup(todayStr, sortedEvents.filter(e => e.date === todayStr), '今日');
                html += renderDayGroup(tomorrowStr, sortedEvents.filter(e => e.date === tomorrowStr), '明日');

                const otherEvents = sortedEvents.filter(e => e.date > tomorrowStr);
                const grouped = {};
                otherEvents.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
                Object.keys(grouped).forEach(date => { html += renderDayGroup(date, grouped[date]); });
            }

            listContainer.innerHTML = html;
            if (window.lucide) window.lucide.createIcons(); 
            
            updateAgendaTimers();
            if(!mainTimerInterval) {
                mainTimerInterval = setInterval(updateAgendaTimers, 1000);
            }
        }

        function renderDayGroup(dateStr, dayEvents, customLabel = null) {
            const dateObj = new Date(dateStr);
            const displayLabel = customLabel || dateObj.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
            
            let html = `<div class="mb-8">`;
            html += `<h3 class="text-sm font-bold text-zinc-500 mb-3 px-2">${displayLabel} <span class="font-medium text-zinc-400 ml-1">${dateStr}</span></h3>`;
            
            if (dayEvents.length === 0) {
                html += `
                    <div class="bg-white/40 rounded-[2rem] p-8 text-center shadow-[0_4px_20px_-5px_rgba(0,0,0,0.03)] flex flex-col items-center justify-center border-0">
                        <p class="text-zinc-400 text-sm font-bold tracking-widest uppercase">這天可以好好放鬆 ☕️</p>
                    </div>`;
            } else {
                html += `<div class="space-y-4">`;
                dayEvents.forEach(e => {
                    const displayTime = formatAMPM(e.time);
                    let displayEndTime = '';
                    
                    const startObj = new Date(`${e.date}T${e.time}:00`);
                    let endObj;
                    if (e.endTime === 'TBD' || !e.endTime || e.endTime.trim() === '') {
                        endObj = new Date(startObj.getTime() + 60*60*1000); 
                    } else {
                        endObj = new Date(`${e.date}T${e.endTime}:00`);
                        if (endObj < startObj) endObj.setDate(endObj.getDate() + 1); 
                        displayEndTime = ' - ' + formatAMPM(e.endTime);
                    }
                    const startMs = startObj.getTime();
                    const endMs = endObj.getTime();

                    if (e.endTime === 'TBD') displayEndTime = ' - 暫未確定';
                    else if (!e.endTime || e.endTime.trim() === '') displayEndTime = ' - 未設定時間';

                    html += `
                        <div onclick="openEventDetail('${e.id}')" data-start="${startMs}" data-end="${endMs}" class="agenda-card bg-white p-6 md:p-8 rounded-[2rem] shadow-[0_8px_30px_-6px_rgba(0,0,0,0.06)] relative overflow-hidden group cursor-pointer hover:shadow-[0_12px_40px_-8px_rgba(0,0,0,0.1)] flex flex-col items-center text-center border-0">
                            <div class="card-indicator absolute top-0 left-0 right-0 h-1.5 bg-zinc-900 transition-colors duration-500"></div>
                            
                            <div class="w-full mt-1">
                                <h4 class="card-title text-xl md:text-2xl font-black text-zinc-900 leading-snug tracking-wide mb-3">${e.title}</h4>
                                
                                <div class="flex flex-col items-center gap-2.5 mb-3">
                                    <span class="flex items-center justify-center gap-1.5 text-zinc-500 text-xs md:text-sm font-bold opacity-80 tabular-nums">
                                        <i data-lucide="clock" class="w-4 h-4"></i> ${displayTime}${displayEndTime}
                                    </span>
                                    <div class="card-timer-badge"></div>
                                </div>
                                
                                ${e.description ? `<p class="card-desc text-zinc-500 text-sm font-medium leading-relaxed line-clamp-2 max-w-sm mx-auto mt-2">${e.description}</p>` : ''}
                            </div>
                            
                            ${isAdmin ? `
                            <button onclick="event.stopPropagation(); deleteEvent('${e.id}')" class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-full transition-colors shadow-sm z-10 opacity-0 group-hover:opacity-100" title="刪除">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                            ` : ''}
                        </div>
                    `;
                });
                html += `</div>`;
            }
            html += `</div>`;
            return html;
        }

                    if (e.endTime === 'TBD' || !e.endTime || e.endTime.trim() === '') {
                        endObj = new Date(startObj.getTime() + 60*60*1000); 
                    } else {
                        endObj = new Date(`${e.date}T${e.endTime}:00`);

                            </button>

        window.clearEndedEvents = async function() {
            if (!isAdmin) return;
            const now = Date.now();
            const eventsToDelete = events.filter(e => {
                const startObj = new Date(`${e.date}T${e.time}:00`);
                let endObj;
                if (e.endTime === 'TBD' || !e.endTime || e.endTime.trim() === '') {
                    endObj = new Date(startObj.getTime() + 60*60*1000); 
                } else {
                    endObj = new Date(`${e.date}T${e.endTime}:00`);
                    if (endObj < startObj) endObj.setDate(endObj.getDate() + 1); 
                }
                return now > endObj.getTime();
            });

            if (eventsToDelete.length === 0) {
                window.showAlert("目前沒有已結束的排程可清除。");
                return;
            }

            try {
                // 批次刪除 (為了確保沒有 alert/confirm，直接刪除後顯示優雅的自訂彈窗)
                const deletePromises = eventsToDelete.map(e => deleteDoc(doc(collection(db, 'artifacts', 'calendar-61298', 'public', 'data', 'events'), e.id)));
                await Promise.all(deletePromises);
                window.showAlert(`成功清除了 ${eventsToDelete.length} 筆已結束的排程。`);
            } catch (error) {
                console.error("Batch delete error", error);
                window.showAlert("清除過程中發生錯誤。");
            }
        }

        function updateAgendaTimers() {
            const now = Date.now();
            document.querySelectorAll('.agenda-card').forEach(card => {
                const start = parseInt(card.dataset.start);
                const end = parseInt(card.dataset.end);
                const indicator = card.querySelector('.card-indicator');
                const badge = card.querySelector('.card-timer-badge');
                const title = card.querySelector('.card-title');
                const desc = card.querySelector('.card-desc');

                card.className = "agenda-card p-6 md:p-8 rounded-[2rem] relative overflow-hidden group cursor-pointer flex flex-col items-center text-center transition-all duration-500 border-0";
                
                if (now > end) {
                    card.classList.add('bg-zinc-50/70', 'shadow-none');
                    indicator.className = "card-indicator absolute top-0 left-0 right-0 h-1.5 bg-zinc-300 transition-colors duration-500";
                    title.className = "card-title text-xl md:text-2xl font-black text-zinc-400 leading-snug tracking-wide mb-3";
                    if(desc) desc.className = "card-desc text-zinc-400 text-sm font-medium leading-relaxed line-clamp-2 max-w-sm mx-auto mt-2";
                    
                    badge.className = "card-timer-badge flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold text-zinc-500 bg-zinc-200/50";
                    badge.innerHTML = `${svgCheck} 已結束`;

                } else if (now >= start && now <= end) {
                    card.classList.add('bg-emerald-50/40', 'shadow-[0_8px_30px_-6px_rgba(16,185,129,0.15)]', 'hover:shadow-[0_12px_40px_-8px_rgba(16,185,129,0.25)]');
                    indicator.className = "card-indicator absolute top-0 left-0 right-0 h-1.5 bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)] transition-colors duration-500";
                    title.className = "card-title text-xl md:text-2xl font-black text-zinc-900 leading-snug tracking-wide mb-3";
                    if(desc) desc.className = "card-desc text-zinc-600 text-sm font-medium leading-relaxed line-clamp-2 max-w-sm mx-auto mt-2";

                    const diff = end - now;
                    badge.className = "card-timer-badge flex items-center px-3 py-1.5 rounded-full text-xs font-bold text-emerald-700 bg-emerald-100 shadow-sm tabular-nums";
                    badge.innerHTML = `
                        <span class="relative flex h-2 w-2 mr-1">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span> 
                        進行中 · 剩餘 ${formatDiffShort(diff)}
                    `;

                } else {
                    const diff = start - now;
                    title.className = "card-title text-xl md:text-2xl font-black text-zinc-900 leading-snug tracking-wide mb-3";
                    if(desc) desc.className = "card-desc text-zinc-500 text-sm font-medium leading-relaxed line-clamp-2 max-w-sm mx-auto mt-2";

                    if (diff < 24 * 60 * 60 * 1000) {
                        card.classList.add('bg-blue-50/20', 'shadow-[0_8px_30px_-6px_rgba(59,130,246,0.1)]', 'hover:shadow-[0_12px_40px_-8px_rgba(59,130,246,0.15)]');
                        indicator.className = "card-indicator absolute top-0 left-0 right-0 h-1.5 bg-blue-500 shadow-[0_0_12px_rgba(59,130,246,0.4)] transition-colors duration-500";
                        
                        badge.className = "card-timer-badge flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold text-blue-600 bg-blue-50 tabular-nums";
                        badge.innerHTML = `${svgClock} 倒數 ${formatDiffShort(diff)}`;
                    } else {
                        card.classList.add('bg-white', 'shadow-[0_8px_30px_-6px_rgba(0,0,0,0.06)]', 'hover:shadow-[0_12px_40px_-8px_rgba(0,0,0,0.1)]');
                        indicator.className = "card-indicator absolute top-0 left-0 right-0 h-1.5 bg-zinc-800 transition-colors duration-500";
                        
                        const days = Math.ceil(diff / (24*60*60*1000));

                        badge.innerHTML = `${svgCal} ${days} 天後`;
                    }
                }
            });
        }

            localStorage.setItem('chim_app_last_endtime', document.getElementById('f-endtime').value);
            localStorage.setItem('chim_app_last_tbd', isTBD);

            const newEvent = {
                title: document.getElementById('f-title').value,
                date: document.getElementById('f-date').value,
                time: timeVal,
                endTime: endTimeVal,
                description: document.getElementById('f-desc').value,
                createdAt: new Date().toISOString()
            };
            try {
                await addDoc(collection(db, 'artifacts', 'calendar-61298', 'public', 'data', 'events'), newEvent);
                window.closeModals();
                e.target.reset();
            } catch (error) { window.showAlert("發佈失敗，請稍後再試。"); }
        }

        window.deleteEvent = async function(id) {
            if (!isAdmin) return;
            try { await deleteDoc(doc(collection(db, 'artifacts', 'calendar-61298', 'public', 'data', 'events'), id)); } 
            catch (error) { window.showAlert("刪除失敗。"); }
        }

        function showOverlayAndModal(modalId) {
            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById(modalId);
            overlay.classList.remove('hidden'); modal.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                modal.classList.remove('translate-y-8', 'scale-95');
            }, 10);
        }

        window.openAddModal = function() {
            document.getElementById('f-date').value = selectedDateStr || formatDate(new Date());
            document.getElementById('f-time').value = localStorage.getItem('chim_app_last_time') || '12:00';
            document.getElementById('f-endtime').value = localStorage.getItem('chim_app_last_endtime') || '';
            const lastTBD = localStorage.getItem('chim_app_last_tbd') === 'true';
            window.toggleTBD(lastTBD);
            showOverlayAndModal('add-modal');
        }

        window.openEventDetail = function(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;

            const dateObj = new Date(event.date);
            document.getElementById('detail-date').innerText = dateObj.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            
            let endStr = '';
            if (event.endTime === 'TBD') {
                endStr = ' - 暫未確定';
            } else if (event.endTime && event.endTime.trim() !== '') {
                endStr = ' - ' + formatAMPM(event.endTime);
            } else {
                endStr = ' - 未設定時間'; 
            }
            
            document.getElementById('detail-time').innerText = `${formatAMPM(event.time)}${endStr}`;
            document.getElementById('detail-title').innerText = event.title;
            
            const descContainer = document.getElementById('detail-desc-container');
            const descEl = document.getElementById('detail-desc');
            
            if (event.description && event.description.trim() !== '') {
                descEl.innerText = event.description;
                descContainer.classList.remove('hidden');
                descContainer.classList.add('flex');
            } else {
                descContainer.classList.add('hidden');
                descContainer.classList.remove('flex');
            }

            showOverlayAndModal('detail-modal');
            if (window.lucide) window.lucide.createIcons();
        }

        window.openSettingsModal = function() { showOverlayAndModal('settings-modal'); }
        
        window.showAlert = function(msg) {
            document.getElementById('alert-msg').innerText = msg;
            
            // 由於 showAlert 可能是疊加在別的 Modal 之上，我們讓它獨立出現並覆蓋
            const alertModal = document.getElementById('alert-modal');
            const overlay = document.getElementById('modal-overlay');
            
            overlay.classList.remove('hidden');
            alertModal.classList.remove('hidden');
            
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                alertModal.classList.remove('translate-y-8', 'scale-95');
            }, 10);
        }

        window.closeAlertModal = function() {
            // 如果 Alert 是疊加在其他介面上，只關閉 Alert
            const alertModal = document.getElementById('alert-modal');
            alertModal.classList.add('translate-y-8', 'scale-95');
            setTimeout(() => {
                alertModal.classList.add('hidden');
                // 如果沒有其他 Modal 是開啟的，才關閉背景
                const otherModalsOpen = ['add-modal', 'settings-modal', 'detail-modal', 'admin-modal'].some(id => !document.getElementById(id).classList.contains('hidden'));
                if (!otherModalsOpen) {
                    const overlay = document.getElementById('modal-overlay');
                    overlay.classList.add('opacity-0');
                    setTimeout(() => overlay.classList.add('hidden'), 400);
                }
            }, 400);
        }

        window.closeModals = function() {
            const overlay = document.getElementById('modal-overlay');
            const modals = ['add-modal', 'alert-modal', 'settings-modal', 'detail-modal', 'admin-modal'];
            overlay.classList.add('opacity-0');
            modals.forEach(id => document.getElementById(id).classList.add('translate-y-8', 'scale-95'));
            setTimeout(() => {
                overlay.classList.add('hidden');
                modals.forEach(id => document.getElementById(id).classList.add('hidden'));
            }, 400); 
        }

        // --- 全螢幕看板邏輯 ---
        window.openDashboard = function() {
            const overlay = document.getElementById('dashboard-overlay');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log("Fullscreen API error:", err));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            forceDashboardUpdate();
            dashboardInterval = setInterval(forceDashboardUpdate, 1000);
            if (window.lucide) window.lucide.createIcons();
        }

        window.closeDashboard = function() {
            clearInterval(dashboardInterval);
            dashboardInterval = null;

            const overlay = document.getElementById('dashboard-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 500);

            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(()=>{});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }
        
        window.toggleOrientation = async function() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                }
                const type = screen.orientation.type;
                if (type.startsWith('portrait')) {
                    await screen.orientation.lock('landscape');
                } else {
                    await screen.orientation.lock('portrait');
                }
            } catch (err) {
                console.warn("Orientation lock not supported", err);
                window.showAlert("您的設備或瀏覽器暫不支持強制旋轉按鈕，請手動旋轉設備即可完美適配！");
            }
        }

        function forceDashboardUpdate() {
            const now = new Date();
            
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('dash-current-time').innerText = timeStr;
            document.getElementById('dash-current-date').innerText = now.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });

            const upcomingEvents = events.map(e => {
                const start = new Date(`${e.date}T${e.time}:00`);
                let end;
                if (e.endTime === 'TBD' || !e.endTime || e.endTime.trim() === '') {
                    end = new Date(start.getTime() + 60*60*1000); 
                } else {
                    end = new Date(`${e.date}T${e.endTime}:00`);
                    if (end < start) end.setDate(end.getDate() + 1); 
                }
                return { ...e, startObj: start, endObj: end };
            })
            .filter(e => e.endObj > now) 
            .sort((a, b) => a.startObj - b.startObj); 

            const labelEl = document.getElementById('dash-status-label');
            const titleEl = document.getElementById('dash-main-title');
            const cdEl = document.getElementById('dash-countdown');
            const timeEl = document.getElementById('dash-main-time');
            const nextTitleEl = document.getElementById('dash-next-title');
            const nextTimeEl = document.getElementById('dash-next-time');

            if (upcomingEvents.length === 0) {
                labelEl.innerText = "目前狀態";
                labelEl.className = "text-zinc-500 font-bold mb-4 md:mb-6 tracking-[0.3em] uppercase text-xs md:text-sm border border-zinc-800 px-4 py-1.5 rounded-full";
                titleEl.innerText = "今日暫無更多安排";
                cdEl.innerText = "--:--:--";
                cdEl.classList.add('opacity-20');
                timeEl.innerText = "享受屬於你的專屬時光";
                nextTitleEl.innerText = "--";
                nextTimeEl.innerText = "--";
                return;
            }

            const targetEvent = upcomingEvents[0];
            cdEl.classList.remove('opacity-20');
            
            titleEl.innerText = targetEvent.title;
            
            let endStr = '';
            if (targetEvent.endTime === 'TBD') {
                endStr = '暫未確定';
            } else if (targetEvent.endTime && targetEvent.endTime.trim() !== '') {
                endStr = formatAMPM(targetEvent.endTime);
            } else {
                endStr = '未設定時間'; 
            }
            timeEl.innerText = `${formatAMPM(targetEvent.time)} - ${endStr}`;

            if (targetEvent.startObj <= now && targetEvent.endObj > now) {
                labelEl.innerText = "正在進行 (IN PROGRESS)";
                labelEl.className = "text-emerald-400 font-bold mb-4 md:mb-6 tracking-[0.2em] uppercase text-xs md:text-sm border border-emerald-500/30 bg-emerald-500/10 px-4 py-1.5 rounded-full shadow-[0_0_15px_rgba(52,211,153,0.2)]";
                
                const diff = targetEvent.endObj - now;
                cdEl.innerText = formatDiffDash(diff);
                cdEl.classList.replace('text-zinc-100', 'text-emerald-400');
            } else {
                labelEl.innerText = "即將開始 (UPCOMING)";
                labelEl.className = "text-amber-400 font-bold mb-4 md:mb-6 tracking-[0.2em] uppercase text-xs md:text-sm border border-amber-500/30 bg-amber-500/10 px-4 py-1.5 rounded-full shadow-[0_0_15px_rgba(251,191,36,0.2)]";
                
                const diff = targetEvent.startObj - now;
                cdEl.innerText = formatDiffDash(diff);
                cdEl.classList.replace('text-emerald-400', 'text-zinc-100');
            }

            if (upcomingEvents.length > 1) {
                const nextEvent = upcomingEvents[1];
                nextTitleEl.innerText = nextEvent.title;
                const nextDatePrefix = isToday(nextEvent.date) ? '今日 ' : new Date(nextEvent.date).toLocaleDateString('zh-TW', {month:'short', day:'numeric'}) + ' ';
                nextTimeEl.innerText = nextDatePrefix + formatAMPM(nextEvent.time);
            } else {
                nextTitleEl.innerText = "無後續安排";
                nextTimeEl.innerText = "--";
            }
        }

        function formatDiffDash(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / (3600 * 24));
            const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');

            if (days > 0) return `${days}天 ${h}:${m}:${s}`;
            return `${h}:${m}:${s}`;
        }

        window.onload = () => {
            window.applyFont(currentFont);
            window.applyBgColor(currentBgColor, currentHeaderColor);
            updateAllViews();
        };
    </script>
