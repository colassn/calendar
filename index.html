<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHIM.SCHEDULE | 專屬日程</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;500;700;900&family=Noto+Sans+HK:wght@400;500;700;900&family=Noto+Serif+HK:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans HK"', 'sans-serif'],
                        serif: ['"Noto Serif HK"', 'serif'],
                        cute: ['"M PLUS Rounded 1c"', 'sans-serif'],
                        wenkai: ['"LXGW WenKai TC"', 'sans-serif'],
                    },
                    colors: {
                        appbg: '#F2F2F7', 
                    },
                    transitionTimingFunction: {
                        'golden': 'cubic-bezier(0.4, 0, 0.2, 1)',
                    }
                }
            }
        }
    </script>
    <style>
        /* 核心過渡動畫與基本重置 */
        body { 
            transition: font-family 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Modal 動畫 (Golden Ratio Scale & Cubic Bezier) */
        .modal-enter { opacity: 0; transform: translateY(20px) scale(0.95); }
        .modal-enter-active { opacity: 1; transform: translateY(0) scale(1); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        
        /* 隱藏原生時間選擇器的圖標，讓版面更乾淨，並確保 44px 觸控區 */
        input[type="time"]::-webkit-calendar-picker-indicator { display: none; background: transparent; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; min-height: 44px; min-width: 44px; }
        
        /* 確保所有輸入框與按鈕的最低觸控高度為 44px (iOS/Android 規範) */
        button, input, select { min-height: 44px; }
        .no-min-h { min-height: auto; } /* 特殊小按鈕的例外處理 */
    </style>
</head>
<body class="antialiased selection:bg-zinc-200 min-h-screen flex flex-col font-sans bg-appbg" id="app-body">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-appbg/70 backdrop-blur-xl border-b border-zinc-200/50 w-full transition-colors duration-300 ease-golden" id="app-header">
        <div class="flex justify-between items-center px-6 py-4 max-w-2xl mx-auto w-full">
            <h1 class="text-xl font-black tracking-tight text-zinc-900">
                CHIM<span class="font-medium text-zinc-500">.APP</span>
            </h1>
            <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full shadow-sm border border-zinc-100 min-h-[44px]">
                <!-- 鋼琴班更改按鈕 -->
                <button onclick="window.openPianoUpdateModal()" class="text-purple-600 hover:text-purple-700 hover:bg-purple-50 transition-colors ease-golden duration-300 p-2 rounded-full flex items-center gap-1.5" title="鋼琴班補堂/更改">
                    <i data-lucide="music" class="w-4 h-4 fill-purple-500/20"></i>
                    <span class="text-[11px] font-bold pr-1">更改琴班</span>
                </button>
                <div class="w-px h-5 bg-zinc-200 mx-1"></div>

                <button onclick="window.openDashboard()" class="text-zinc-400 hover:text-zinc-900 transition-colors ease-golden duration-300 p-2 rounded-full" title="全螢幕動態看板">
                    <i data-lucide="monitor-play" class="w-5 h-5"></i>
                </button>
                <div class="w-px h-5 bg-zinc-200 mx-1"></div>
                <button onclick="window.openSettingsModal()" class="text-zinc-400 hover:text-zinc-900 transition-colors ease-golden duration-300 p-2 rounded-full" title="個性化設定">
                    <i data-lucide="palette" class="w-5 h-5"></i>
                </button>
                <div class="w-px h-5 bg-zinc-200 mx-1"></div>
                <div id="auth-container" class="flex items-center gap-1.5 min-h-[44px]">
                    <!-- Auth buttons injected here -->
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content (Golden Ratio 寬度比例設計 max-w-2xl 約等於黃金比例基準) -->
    <main class="max-w-2xl mx-auto px-5 py-8 pb-32 w-full flex-1 flex flex-col gap-10">
        <section id="agenda-section" class="w-full">
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="flex items-center gap-3">
                    <h2 id="agenda-title" class="text-2xl font-bold tracking-tight text-zinc-900">即將到來</h2>
                    <button onclick="window.goToToday()" class="px-4 py-2 bg-zinc-100 hover:bg-zinc-200 text-zinc-600 rounded-full text-xs font-bold transition-colors ease-golden duration-300 shadow-sm min-h-[44px]">今日</button>
                </div>
                <button id="show-all-btn" class="hidden px-4 py-2 bg-zinc-200/50 hover:bg-zinc-200 text-zinc-600 rounded-full text-xs font-bold transition-colors ease-golden duration-300 min-h-[44px]" onclick="window.clearDateSelection()">
                    顯示全部
                </button>
            </div>
            <div id="filter-bar" class="flex gap-2 px-2 mb-6 overflow-x-auto hide-scrollbar"></div>
            <div id="agenda-list" class="space-y-6"></div>
        </section>

        <section id="calendar-section" class="w-full">
            <div class="bg-white rounded-[2rem] p-8 shadow-[0_2px_20px_-4px_rgba(0,0,0,0.04)] border border-zinc-100/80 transition-all ease-golden duration-300">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="calendar-month-title" class="text-xl font-bold tracking-tight text-zinc-900"></h2>
                    <div class="flex items-center gap-2">
                        <button onclick="window.goToToday()" class="px-4 py-2 bg-zinc-100 hover:bg-zinc-200 text-zinc-600 rounded-full text-xs font-bold transition-all ease-golden duration-300 shadow-sm min-h-[44px]">今日</button>
                        <div class="flex gap-1 bg-zinc-50 rounded-full p-1 min-h-[44px] items-center">
                            <button onclick="window.changeMonth(-1)" class="p-2 text-zinc-500 hover:text-zinc-900 hover:bg-white rounded-full transition-all ease-golden duration-300 min-h-[36px] w-10 flex items-center justify-center no-min-h"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                            <button onclick="window.changeMonth(1)" class="p-2 text-zinc-500 hover:text-zinc-900 hover:bg-white rounded-full transition-all ease-golden duration-300 min-h-[36px] w-10 flex items-center justify-center no-min-h"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-y-4 gap-x-2 text-center text-sm font-medium"></div>
                <div class="mt-6 pt-5 border-t border-zinc-50 flex items-center justify-center gap-6 text-[11px] font-bold text-zinc-400 uppercase tracking-widest">
                    <div class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full bg-emerald-400"></div>1項</div>
                    <div class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full bg-amber-400"></div>2項</div>
                    <div class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full bg-rose-400"></div>3項+</div>
                </div>
            </div>
        </section>
    </main>

    <!-- FAB -->
    <div id="fab-container" class="hidden fixed bottom-10 left-0 right-0 pointer-events-none z-40 justify-center">
        <button onclick="window.openAddModal()" class="pointer-events-auto flex items-center gap-2 px-8 py-4 bg-zinc-900/90 backdrop-blur-md text-white rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.2)] hover:bg-zinc-800 hover:scale-105 transition-all ease-golden duration-300 min-h-[56px]">
            <i data-lucide="plus" class="w-5 h-5"></i>
            <span class="font-bold text-sm tracking-wide">新增排程</span>
        </button>
    </div>

    <!-- MAIN Modals Overlay -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm hidden opacity-0 transition-opacity ease-golden duration-300">

        <!-- 鋼琴班智能更改 Modal -->
        <div id="piano-update-modal" class="hidden flex flex-col bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform translate-y-8 scale-95 transition-all ease-golden duration-300 max-h-[90vh]">
            <div class="bg-purple-50 p-6 pb-5 text-center relative shrink-0 border-b border-purple-100">
                <button onclick="window.closeModals()" class="absolute top-6 right-6 bg-white text-zinc-400 hover:text-zinc-800 p-2.5 rounded-full shadow-sm transition-colors ease-golden min-h-[44px] w-[44px] flex items-center justify-center">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm">
                    <i data-lucide="music" class="w-6 h-6 text-purple-500 fill-purple-500"></i>
                </div>
                <h3 class="text-xl font-black text-zinc-900 tracking-tight mb-1">更改琴班</h3>
                <p class="text-zinc-500 font-bold text-xs">直接貼上老師的 WhatsApp 對話自動解析！</p>
            </div>
            
            <div class="bg-zinc-50/70 px-6 py-4 shrink-0 border-b border-zinc-100 flex items-center gap-3 overflow-x-auto hide-scrollbar min-h-[76px]" id="pu-existing-list">
                <!-- 動態載入 -->
            </div>

            <div class="p-6 overflow-y-auto hide-scrollbar bg-white grow w-full space-y-6">
                <form id="piano-update-form" onsubmit="window.handlePianoSubmit(event)" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase tracking-widest pl-1">智能解析 (貼上訊息)</label>
                        <textarea id="pu-text" rows="2" oninput="window.handlePianoPaste(event)" class="w-full px-4 py-4 text-sm bg-white border border-zinc-200 focus:outline-none focus:ring-2 focus:ring-indigo-400 text-zinc-900 rounded-2xl resize-none font-medium placeholder:text-zinc-300 shadow-inner transition-shadow min-h-[88px]" placeholder="例如：27/02 五 6:15-7:15 (堂後+15分鐘)"></textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-zinc-400 mb-2 uppercase tracking-widest pl-1">時間設定</label>
                        <div class="bg-white border border-zinc-200 rounded-[1.5rem] p-1.5 shadow-sm">
                            <div class="flex items-center px-4 py-3 border-b border-zinc-100 min-h-[56px]">
                                <i data-lucide="calendar" class="w-5 h-5 text-indigo-500 mr-3 shrink-0"></i>
                                <input id="pu-date" onchange="window.checkPianoConflict()" required type="date" class="w-full bg-transparent focus:outline-none text-zinc-900 font-bold text-base tracking-wide no-min-h">
                            </div>
                            <div class="flex items-center justify-between p-2 gap-2">
                                <div class="flex-1 bg-zinc-50 rounded-xl px-3 py-3 text-center border border-zinc-100">
                                    <p class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5">開始</p>
                                    <input id="pu-time" required type="time" class="w-full bg-transparent text-center focus:outline-none text-zinc-900 font-black text-xl no-min-h h-8">
                                </div>
                                <i data-lucide="arrow-right" class="w-5 h-5 text-zinc-300 shrink-0"></i>
                                <div class="flex-1 bg-zinc-50 rounded-xl px-3 py-3 text-center border border-zinc-100">
                                    <p class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest mb-1.5">結束</p>
                                    <input id="pu-endtime" type="time" class="w-full bg-transparent text-center focus:outline-none text-zinc-900 font-black text-xl no-min-h h-8">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <div class="bg-indigo-50/40 p-1.5 rounded-[1.25rem] border border-indigo-100 flex items-center relative overflow-hidden">
                            <input type="hidden" id="pu-repeat" value="none">
                            <button type="button" onclick="window.openSelectModal('pu-repeat')" id="pu-repeat-btn" class="w-full flex justify-between items-center pl-4 pr-3 py-3 text-sm bg-transparent text-indigo-900 font-bold transition-colors min-h-[44px]">
                                單次排程 <i data-lucide="chevron-down" class="w-4 h-4 text-indigo-400"></i>
                            </button>
                        </div>
                        <div id="pu-repeat-count-container" class="hidden bg-indigo-50/40 p-1.5 rounded-[1.25rem] border border-indigo-100 items-center relative overflow-hidden">
                            <div class="bg-white p-3 rounded-xl ml-0.5 shadow-sm text-indigo-500 text-[10px] font-bold text-center w-10 h-10 flex items-center justify-center leading-none shrink-0">次數</div>
                            <input id="pu-repeat-count" type="number" min="2" max="52" value="4" class="w-full pl-3 pr-2 py-3 text-sm bg-transparent focus:outline-none text-indigo-900 font-bold no-min-h" placeholder="重複次數">
                        </div>
                    </div>

                    <div id="pu-conflict-warning" class="hidden bg-amber-50 border border-amber-200 p-5 rounded-[1.5rem] flex flex-col gap-3">
                        <div class="flex items-start gap-3">
                            <i data-lucide="alert-circle" class="w-5 h-5 text-amber-500 shrink-0 mt-0.5"></i>
                            <div>
                                <p class="text-sm font-bold text-amber-800 mb-1">發現該日已有鋼琴班</p>
                                <p class="text-xs font-medium text-amber-600 leading-relaxed">原本設定時間為 <span id="pu-conflict-time" class="font-black border-b border-amber-300"></span>。確認發佈將會覆蓋舊時間。</p>
                            </div>
                        </div>
                    </div>

                    <div id="pu-submit-section" class="pt-4">
                        <button type="submit" id="pu-submit-btn" class="w-full py-4 text-base font-black text-white bg-purple-500 rounded-[1.5rem] hover:bg-purple-600 transition-colors ease-golden shadow-lg shadow-purple-500/30 active:scale-[0.98] tracking-wide min-h-[56px]">確認並發佈</button>
                    </div>

                </form>
            </div>
        </div>

        <!-- Add / Edit Modal -->
        <div id="add-modal" class="hidden flex flex-col bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform translate-y-8 scale-95 transition-all ease-golden duration-300 max-h-[90vh]">
            <div class="flex justify-between items-center p-6 pb-4 border-b border-zinc-50 shrink-0">
                <h3 id="form-modal-title" class="text-lg font-bold text-zinc-900 tracking-tight">新增排程</h3>
                <button onclick="window.closeModals()" class="bg-zinc-100 text-zinc-500 hover:bg-zinc-200 p-2.5 rounded-full transition-colors min-h-[44px] w-[44px] flex items-center justify-center">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto hide-scrollbar bg-white grow w-full">
                <form id="add-form" onsubmit="window.handleAddOrEditEvent(event)" class="space-y-5">
                    
                    <div>
                        <div class="bg-zinc-50 p-2 rounded-2xl border border-zinc-100 flex gap-2">
                            <input id="f-tag" type="text" class="w-1/3 px-3 py-3 text-base bg-transparent focus:outline-none text-zinc-900 placeholder:text-zinc-400 font-bold border-r border-zinc-200 no-min-h" placeholder="標籤(選)">
                            <input id="f-title" required type="text" class="w-2/3 px-3 py-3 text-base bg-transparent focus:outline-none text-zinc-900 placeholder:text-zinc-400 font-bold no-min-h" placeholder="準備做些什麼？">
                        </div>
                        <div id="dynamic-tags-container" class="flex flex-wrap gap-2 mt-3 px-1"></div>
                    </div>

                    <div class="bg-zinc-50 p-1.5 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden min-h-[56px]">
                        <div class="bg-white p-3 rounded-xl ml-1 shadow-sm shrink-0"><i data-lucide="calendar" class="text-zinc-500 w-5 h-5"></i></div>
                        <input id="f-date" required type="date" class="w-full pl-4 pr-2 py-3 text-base bg-transparent focus:outline-none text-zinc-900 font-bold no-min-h">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-zinc-50 p-1.5 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden min-h-[56px]">
                            <div class="bg-white p-3 rounded-xl ml-1 shadow-sm text-zinc-500 text-[11px] font-bold text-center w-11 h-11 flex items-center justify-center leading-none shrink-0">開始</div>
                            <input id="f-time" required type="time" class="w-full pl-3 pr-2 py-3 text-base bg-transparent focus:outline-none text-zinc-900 font-bold no-min-h">
                        </div>
                        <div class="bg-zinc-50 p-1.5 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden min-h-[56px]">
                            <div class="bg-white p-3 rounded-xl ml-1 shadow-sm text-zinc-500 text-[11px] font-bold text-center w-11 h-11 flex items-center justify-center leading-none shrink-0">完結</div>
                            <input id="f-endtime" type="time" class="w-full pl-3 pr-2 py-3 text-base bg-transparent focus:outline-none text-zinc-900 font-bold no-min-h">
                            <div id="f-endtime-tbd-overlay" class="absolute inset-0 bg-zinc-50/90 backdrop-blur-md flex items-center justify-center cursor-pointer hidden transition-opacity duration-300" onclick="window.toggleTBD()">
                                <span class="text-sm font-bold text-zinc-600 tracking-wider">暫未確定</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-end mt-1">
                        <button type="button" onclick="window.toggleTBD()" class="text-xs bg-zinc-100 hover:bg-zinc-200 text-zinc-700 font-bold px-4 py-2.5 rounded-xl transition-colors flex items-center gap-2 shadow-sm min-h-[44px]">
                            <i data-lucide="help-circle" class="w-4 h-4"></i> 設為「暫未確定」結束
                        </button>
                    </div>
                    
                    <div id="repeat-section" class="grid grid-cols-2 gap-3 mt-5">
                        <div class="bg-zinc-50 p-1.5 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden">
                            <input type="hidden" id="f-repeat" value="none">
                            <button type="button" onclick="window.openSelectModal('f-repeat')" id="f-repeat-btn" class="w-full flex justify-between items-center pl-4 pr-3 py-3 text-sm bg-transparent text-zinc-900 font-bold transition-colors min-h-[44px]">
                                單次排程 <i data-lucide="chevron-down" class="w-4 h-4 text-zinc-400"></i>
                            </button>
                        </div>
                        <div id="repeat-count-container" class="hidden bg-zinc-50 p-1.5 rounded-2xl border border-zinc-100 items-center relative overflow-hidden">
                            <div class="bg-white p-3 rounded-xl ml-1 shadow-sm text-zinc-500 text-[11px] font-bold text-center w-11 h-11 flex items-center justify-center leading-none shrink-0">次數</div>
                            <input id="f-repeat-count" type="number" min="2" max="52" value="4" class="w-full pl-3 pr-2 py-3 text-base bg-transparent focus:outline-none text-zinc-900 font-bold no-min-h" placeholder="重複次數">
                        </div>
                    </div>

                    <div class="bg-zinc-50 p-1.5 rounded-2xl border border-zinc-100 flex items-center relative overflow-hidden min-h-[56px] mt-4">
                        <div class="bg-white p-3 rounded-xl ml-1 shadow-sm shrink-0"><i data-lucide="map-pin" class="text-zinc-500 w-5 h-5"></i></div>
                        <input id="f-location" type="text" class="w-full pl-4 pr-2 py-3 text-base bg-transparent focus:outline-none text-zinc-900 font-bold no-min-h" placeholder="輸入地點 (選填)">
                    </div>
                    <div class="pt-6 shrink-0">
                        <button type="submit" id="form-submit-btn" class="w-full py-4 text-base font-bold text-white bg-zinc-900 rounded-2xl hover:bg-zinc-800 transition-colors ease-golden shadow-lg shadow-zinc-900/20 active:scale-[0.98] min-h-[56px]">確認建立</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Alert Modal (Golden Ratio Width applied implicitly) -->
        <div id="alert-modal" class="hidden bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform translate-y-8 scale-95 transition-all ease-golden duration-300 z-[110]">
            <div class="flex flex-col items-center text-center p-10 pt-12">
                <div class="w-14 h-14 bg-amber-50 rounded-full flex items-center justify-center mb-5">
                    <i data-lucide="info" class="text-amber-500 w-7 h-7"></i>
                </div>
                <p id="alert-msg" class="text-zinc-800 text-base mb-8 font-bold leading-relaxed tracking-wide">訊息內容</p>
                <button onclick="window.closeAlertModal()" class="w-full py-4 bg-zinc-100 text-zinc-900 rounded-2xl hover:bg-zinc-200 transition-colors text-sm font-bold min-h-[56px]">我知道了</button>
            </div>
        </div>

        <!-- Admin Modal -->
        <div id="admin-modal" class="hidden flex flex-col bg-white rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden transform translate-y-8 scale-95 transition-all ease-golden duration-300 max-h-[85vh]">
            <div class="flex justify-between items-center p-6 pb-4 border-b border-zinc-100 shrink-0">
                <h3 class="text-lg font-bold text-zinc-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="shield-alert" class="w-5 h-5 text-emerald-500"></i> 管理中心
                </h3>
                <button onclick="window.closeModals()" class="bg-zinc-100 text-zinc-500 hover:bg-zinc-200 p-2.5 rounded-full transition-colors min-h-[44px] w-[44px] flex items-center justify-center">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto space-y-8 bg-white grow hide-scrollbar w-full">
                <!-- 標籤管理區塊 -->
                <div>
                    <h4 class="text-xs font-bold text-zinc-400 uppercase tracking-wider ml-1 mb-3 flex items-center gap-1.5"><i data-lucide="tags" class="w-4 h-4"></i> 自定義標籤管理</h4>
                    <div class="flex gap-2 mb-4">

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function getTomorrowDate() { const tmr = new Date(); tmr.setDate(tmr.getDate() + 1); return formatDate(tmr); }
        function isToday(dateStr) { return formatDate(new Date()) === dateStr; }
        
        function formatAMPM(timeStr) {
            if (!timeStr || String(timeStr).trim() === '') return '';
            try {
                const [hourStr, minuteStr] = timeStr.split(':');
                if(!hourStr || !minuteStr) return timeStr;
                let hour = parseInt(hourStr, 10);
                const ampm = hour >= 12 ? '下午' : '上午';
                hour = hour % 12; hour = hour ? hour : 12; 
                return `${ampm} ${hour}:${minuteStr}`;
            } catch(e) { return timeStr; }
        }
        
        function getNextDayOfWeek(dow) {
            const d = new Date();
            const currentDay = d.getDay();
            let distance = dow - currentDay;
            if (distance < 0) distance += 7;
            d.setDate(d.getDate() + distance);
            return formatDate(d);
        }

        window.toggleRepeatCount = function() {
            const repeatType = document.getElementById('f-repeat').value;
            const container = document.getElementById('repeat-count-container');
            if (repeatType === 'none') {

        window.handleAddOrEditEvent = async function(e) {
            e.preventDefault();
            if (!isAdmin) return;
            
            const timeVal = document.getElementById('f-time').value;
            const overlay = document.getElementById('f-endtime-tbd-overlay');
            const isTBD = overlay && !overlay.classList.contains('hidden');
            const endTimeVal = isTBD ? 'TBD' : document.getElementById('f-endtime').value;
            
            const repeatType = document.getElementById('f-repeat').value;
            const repeatCountStr = document.getElementById('f-repeat-count').value;
            const repeatCount = (repeatType === 'none' || editingId) ? 1 : parseInt(repeatCountStr, 10);

            if (!editingId) {
                localStorage.setItem('chim_app_last_time', timeVal);
                localStorage.setItem('chim_app_last_endtime', document.getElementById('f-endtime').value);
                localStorage.setItem('chim_app_last_tbd', isTBD);
            }

            const baseDateStr = document.getElementById('f-date').value;
            const [year, month, day] = baseDateStr.split('-').map(Number);
            const tagVal = document.getElementById('f-tag').value;
            const titleVal = document.getElementById('f-title').value;
            const locationVal = document.getElementById('f-location').value;

            try {
                const dbPath = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                
                if (editingId) {
                    const eventDoc = doc(db, 'artifacts', appId, 'public', 'data', 'events', editingId);
                    await updateDoc(eventDoc, {
                        tag: tagVal,
                        title: titleVal,
                        date: baseDateStr,
                        time: timeVal,
                        endTime: endTimeVal,
                        location: locationVal,
                    });
                } 
                else {
                    const newEvents = [];
                    for (let i = 0; i < repeatCount; i++) {
                        let targetDate = new Date(year, month - 1, day);
                        if (repeatType === 'weekly') targetDate.setDate(targetDate.getDate() + 7 * i);
                        else if (repeatType === 'monthly') targetDate.setMonth(targetDate.getMonth() + i);

                        newEvents.push({
                            tag: tagVal,
                            title: titleVal,
                            date: formatDate(targetDate),
                            time: timeVal,
                            endTime: endTimeVal,
                            location: locationVal,
                            createdAt: new Date().toISOString()
                        });
                    }
                    await Promise.all(newEvents.map(eventData => addDoc(dbPath, eventData)));
                }

                window.closeModals();
                e.target.reset();
                document.getElementById('f-repeat').value = 'none';
                document.getElementById('f-repeat-btn').innerHTML = `單次排程 <i data-lucide="chevron-down" class="w-4 h-4 text-zinc-400"></i>`;
                window.toggleRepeatCount();
            } catch (error) { 
                console.error(error);
                window.showAlert("儲存失敗，請確認 Firebase 資料庫規則是否已設為允許讀寫。"); 
            }
        }

        window.renderCalendar = function() {
            const year = currentMonthDate.getFullYear();
            const month = currentMonthDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            document.getElementById('calendar-month-title').innerText = 
                currentMonthDate.toLocaleString('zh-TW', { month: 'long', year: 'numeric' });

            const grid = document.getElementById('calendar-grid');
            let html = '';

            ['日', '一', '二', '三', '四', '五', '六'].forEach(day => {
                html += `<div class="text-zinc-400 font-bold text-xs py-2">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) { html += `<div></div>`; }

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = formatDate(new Date(year, month, i));
                const count = events.filter(e => e.date === dateStr).length;
                
                let colorClass = 'text-zinc-700 hover:bg-zinc-100';
                if (count === 1) colorClass = 'bg-emerald-100 text-emerald-800';
                if (count === 2) colorClass = 'bg-amber-100 text-amber-800';
                if (count >= 3) colorClass = 'bg-rose-500 text-white shadow-md shadow-rose-500/20';

                const isSelected = selectedDateStr === dateStr;
                const selectedClass = isSelected ? 'ring-2 ring-offset-2 ring-zinc-900 scale-110 shadow-md z-10' : '';
                const todayClass = (isToday(dateStr) && !isSelected && count === 0) ? 'border-2 border-zinc-200' : '';

                html += `
                    <button onclick="window.selectDate('${dateStr}')" class="w-10 h-10 mx-auto rounded-full flex items-center justify-center transition-all duration-300 ease-golden no-min-h text-sm font-bold ${colorClass} ${selectedClass} ${todayClass}">
                        ${i}
                    </button>

        window.renderAgenda = function() {
            const listContainer = document.getElementById('agenda-list');
            const showAllBtn = document.getElementById('show-all-btn');
            const titleEl = document.getElementById('agenda-title');
            
            let filteredEvents = events;
            if (activeFilter) {
                filteredEvents = events.filter(e => e.tag === activeFilter);
            }
            const sortedEvents = [...filteredEvents].sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            
            let html = '';

            if (selectedDateStr) {
                const d = new Date(selectedDateStr);
                titleEl.innerText = d.toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'short' });
                showAllBtn.classList.remove('hidden');
                html += window.renderDayGroup(selectedDateStr, sortedEvents.filter(e => e.date === selectedDateStr));
            } else {
                titleEl.innerText = '近期安排';
                showAllBtn.classList.add('hidden');
                
                const todayStr = formatDate(new Date());
                const tomorrowStr = getTomorrowDate();
                
                html += window.renderDayGroup(todayStr, sortedEvents.filter(e => e.date === todayStr), '今日');
                html += window.renderDayGroup(tomorrowStr, sortedEvents.filter(e => e.date === tomorrowStr), '明日');

                const otherEvents = sortedEvents.filter(e => e.date > tomorrowStr);
                const grouped = {};
                otherEvents.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
                Object.keys(grouped).forEach(date => { html += window.renderDayGroup(date, grouped[date]); });
            }

            listContainer.innerHTML = html;
            window.renderFilters(); // Ensure filters are rendered
            if (window.lucide) window.lucide.createIcons(); 
            
            window.updateAgendaTimers();
            if(!mainTimerInterval) {
                mainTimerInterval = setInterval(window.updateAgendaTimers, 1000);
            }
        }

        window.updateAgendaTimers = function() {
            const now = Date.now();
            document.querySelectorAll('.agenda-card').forEach(card => {
                const start = parseInt(card.dataset.start);
                const end = parseInt(card.dataset.end);
                const indicator = card.querySelector('.card-indicator');
                const badge = card.querySelector('.card-timer-badge');
                const title = card.querySelector('.card-title');

                card.className = "agenda-card p-8 md:p-10 rounded-[2rem] relative overflow-hidden group cursor-pointer flex flex-col items-center text-center transition-all duration-500 border-0 min-h-[140px]";
                
                if (now > end) {
                    card.classList.add('bg-zinc-50/70', 'shadow-none');
                    indicator.className = "card-indicator absolute top-0 left-0 right-0 h-2 bg-zinc-300 transition-colors duration-500";
                    title.className = "card-title text-2xl md:text-3xl font-black text-zinc-400 leading-snug tracking-wide mb-4";
                    
                    badge.className = "card-timer-badge flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold text-zinc-500 bg-zinc-200/50 mt-2";
                    badge.innerHTML = `${svgCheck} 已結束`;

                } else if (now >= start && now <= end) {
                    card.classList.add('bg-emerald-50/40', 'shadow-lg');
                    indicator.className = "card-indicator absolute top-0 left-0 right-0 h-2 bg-emerald-500 shadow-sm transition-colors duration-500";
                    title.className = "card-title text-2xl md:text-3xl font-black text-zinc-900 leading-snug tracking-wide mb-4";

                    const diff = end - now;
                    badge.className = "card-timer-badge flex items-center px-4 py-2 rounded-full text-xs font-bold text-emerald-700 bg-emerald-100 shadow-sm tabular-nums mt-2";
                    badge.innerHTML = `
                        <span class="relative flex h-2.5 w-2.5 mr-2">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                        </span> 
                        進行中 · 剩餘 ${window.formatDiffDash(diff)}
                    `;

                } else {
                    const diff = start - now;
                    title.className = "card-title text-2xl md:text-3xl font-black text-zinc-900 leading-snug tracking-wide mb-4";

                    if (diff < 24 * 60 * 60 * 1000) {
                        card.classList.add('bg-blue-50/20', 'shadow-md');
                        indicator.className = "card-indicator absolute top-0 left-0 right-0 h-2 bg-blue-500 transition-colors duration-500";
                        
                        badge.className = "card-timer-badge flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold text-blue-600 bg-blue-50 tabular-nums mt-2";
                        badge.innerHTML = `${svgClock} 倒數 ${window.formatDiffDash(diff)}`;
                    } else {
                        card.classList.add('bg-white', 'shadow-md');
                        indicator.className = "card-indicator absolute top-0 left-0 right-0 h-2 bg-zinc-800 transition-colors duration-500";
                        
                        const days = Math.ceil(diff / (24*60*60*1000));
                        badge.className = "card-timer-badge flex items-center gap-2 px-4 py-2 rounded-full text-xs font-bold text-zinc-500 bg-zinc-100 mt-2";
                        badge.innerHTML = `${svgCal} ${days} 天後`;
                    }
                }
            });
        }

        window.handlePianoPaste = function(e) {
            const text = e.target.value;
            if(!text) return;
            let found = false;
            
            const dateMatch = text.match(/(\d{1,2})\/(\d{1,2})/g);
            if (dateMatch && dateMatch.length > 0) {
                const lastMatch = dateMatch[dateMatch.length - 1]; 
                const parts = lastMatch.split('/');
                const d = parts[0].padStart(2, '0');
                const m = parts[1].padStart(2, '0');
                const yearMatch = text.match(/20\d{2}/);
                const y = yearMatch ? yearMatch[0] : new Date().getFullYear();
                document.getElementById('pu-date').value = `${y}-${m}-${d}`;
                found = true;
            }
            
            const timeMatch = text.match(/(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})/);
            if (timeMatch) {
                const to24h = (t) => {
                    let [h, m] = t.split(':');
                    h = parseInt(h, 10);
                    if (h >= 1 && h <= 11) h += 12;
                    return `${String(h).padStart(2, '0')}:${m}`;
                };
                document.getElementById('pu-time').value = to24h(timeMatch[1]);
                document.getElementById('pu-endtime').value = to24h(timeMatch[2]);
                found = true;
            }
            if (found) window.checkPianoConflict();
        }

        window.checkPianoConflict = function() {
            const dateVal = document.getElementById('pu-date').value;
            const conflict = events.find(e => e.tag === '鋼琴班' && e.date === dateVal);
            const warningEl = document.getElementById('pu-conflict-warning');
            const submitBtn = document.getElementById('pu-submit-btn');

            if (conflict) {
                document.getElementById('pu-conflict-time').innerText = formatAMPM(conflict.time);
                warningEl.classList.remove('hidden');
                submitBtn.innerText = "確認覆蓋更改";
                submitBtn.classList.replace('bg-purple-500', 'bg-rose-500');
                submitBtn.classList.replace('hover:bg-purple-600', 'hover:bg-rose-600');
                submitBtn.classList.replace('shadow-purple-500/30', 'shadow-rose-500/30');
            } else {
                warningEl.classList.add('hidden');
                submitBtn.innerText = "確認並發佈";
                submitBtn.classList.replace('bg-rose-500', 'bg-purple-500');
                submitBtn.classList.replace('hover:bg-rose-600', 'hover:bg-purple-600');
                submitBtn.classList.replace('shadow-rose-500/30', 'shadow-purple-500/30');
            }
        }

        window.executePianoSubmit = async function() {
            const dateVal = document.getElementById('pu-date').value;
            const timeVal = document.getElementById('pu-time').value;
            const endtimeVal = document.getElementById('pu-endtime').value;
            
            const repeatType = document.getElementById('pu-repeat').value;
            const repeatCountStr = document.getElementById('pu-repeat-count').value;
            const repeatCount = (repeatType === 'none') ? 1 : parseInt(repeatCountStr, 10);

            const [year, month, day] = dateVal.split('-').map(Number);
            const newEvents = [];
            const datesToCheck = [];

            for (let i = 0; i < repeatCount; i++) {
                let targetDate = new Date(year, month - 1, day);
                if (repeatType === 'weekly') targetDate.setDate(targetDate.getDate() + 7 * i);
                else if (repeatType === 'monthly') targetDate.setMonth(targetDate.getMonth() + i);

                const dStr = formatDate(targetDate);
                datesToCheck.push(dStr);

                newEvents.push({
                    tag: '鋼琴班',
                    title: '鋼琴班補堂',
                    location: '',
                    date: dStr,
                    time: timeVal,
                    endTime: endtimeVal,
                    createdAt: new Date().toISOString()
                });
            }

            try {
                // Bug fix: exclude dates out of mapped conflicts gracefully
                const conflicts = events.filter(ev => ev.tag === '鋼琴班' && datesToCheck.includes(ev.date));
                const deletePromises = conflicts.map(c => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events'), c.id));
                await Promise.all(deletePromises);

                const dbPath = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                await Promise.all(newEvents.map(eventData => addDoc(dbPath, eventData)));

                window.closeModals();
                document.getElementById('piano-update-form').reset();
                window.checkPianoConflict();
                window.showAlert("🎹 鋼琴班排程已成功發佈/更新！");
            } catch (error) { 
                console.error(error);
                window.showAlert("發佈失敗，請確認資料庫權限 (Rules)。"); 
            }
        }
        
        window.handlePianoSubmit = function(e) {
            e.preventDefault();
            window.executePianoSubmit();
        }

                document.documentElement.webkitRequestFullscreen();
            }

            window.forceDashboardUpdate();
            dashboardInterval = setInterval(window.forceDashboardUpdate, 1000);
            if (window.lucide) window.lucide.createIcons();
        }

        window.closeDashboard = function() {
            clearInterval(dashboardInterval);
            dashboardInterval = null;
            const overlay = document.getElementById('dashboard-overlay');
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 500);

            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }
        
        window.toggleOrientation = async function() {
            try {
                if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
                const type = screen.orientation.type;
                if (type.startsWith('portrait')) await screen.orientation.lock('landscape');
                else await screen.orientation.lock('portrait');
            } catch (err) { window.showAlert("您的設備或瀏覽器暫不支持強制旋轉按鈕，請手動旋轉設備即可完美適配！"); }
        }

        window.forceDashboardUpdate = function() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('dash-current-time').innerText = timeStr;
            document.getElementById('dash-current-date').innerText = now.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric', weekday: 'short' });

            const upcomingEvents = events.map(e => {
                const start = new Date(`${e.date}T${e.time}:00`);
                let end;
                if (e.endTime === 'TBD' || !e.endTime || String(e.endTime).trim() === '') end = new Date(start.getTime() + 60*60*1000); 
                else {
                    end = new Date(`${e.date}T${e.endTime}:00`);
                    if (end < start) end.setDate(end.getDate() + 1); 
                }
                return { ...e, startObj: start, endObj: end };
            })
            .filter(e => e.endObj > now) 
            .sort((a, b) => a.startObj - b.startObj); 

            const labelEl = document.getElementById('dash-status-label');
            const titleEl = document.getElementById('dash-main-title');
            const cdEl = document.getElementById('dash-countdown');
            const timeEl = document.getElementById('dash-main-time');
            const nextTitleEl = document.getElementById('dash-next-title');
            const nextTimeEl = document.getElementById('dash-next-time');

            if (upcomingEvents.length === 0) {
                labelEl.innerText = "目前狀態";
                labelEl.className = "text-zinc-500 font-bold mb-6 md:mb-8 tracking-[0.3em] uppercase text-sm md:text-base border border-zinc-800 px-5 py-2 rounded-full";
                titleEl.innerText = "今日暫無更多安排";
                cdEl.innerText = "--:--:--";
                cdEl.classList.add('opacity-20');
                timeEl.innerText = "享受屬於你的專屬時光";
                nextTitleEl.innerText = "--";
                nextTimeEl.innerText = "--";
                return;
            }

            const targetEvent = upcomingEvents[0];
            cdEl.classList.remove('opacity-20');
            titleEl.innerText = targetEvent.tag ? `【${targetEvent.tag}】${targetEvent.title}` : targetEvent.title;
            
            let endStr = '';
            if (targetEvent.endTime === 'TBD') endStr = '暫未確定';
            else if (targetEvent.endTime && String(targetEvent.endTime).trim() !== '') endStr = formatAMPM(targetEvent.endTime);
            else endStr = '未設定時間'; 
            timeEl.innerText = `${formatAMPM(targetEvent.time)} - ${endStr}`;

            if (targetEvent.startObj <= now && targetEvent.endObj > now) {
                labelEl.innerText = "正在進行 (IN PROGRESS)";
                labelEl.className = "text-emerald-400 font-bold mb-6 md:mb-8 tracking-[0.2em] uppercase text-sm md:text-base border border-emerald-500/30 bg-emerald-500/10 px-5 py-2 rounded-full shadow-[0_0_15px_rgba(52,211,153,0.2)]";
                
                const diff = targetEvent.endObj - now;
                cdEl.innerText = window.formatDiffDash(diff);
                cdEl.classList.replace('text-zinc-100', 'text-emerald-400');
            } else {
                labelEl.innerText = "即將開始 (UPCOMING)";
                labelEl.className = "text-amber-400 font-bold mb-6 md:mb-8 tracking-[0.2em] uppercase text-sm md:text-base border border-amber-500/30 bg-amber-500/10 px-5 py-2 rounded-full shadow-[0_0_15px_rgba(251,191,36,0.2)]";
                
                const diff = targetEvent.startObj - now;
                cdEl.innerText = window.formatDiffDash(diff);
                cdEl.classList.replace('text-emerald-400', 'text-zinc-100');
            }

            if (upcomingEvents.length > 1) {
                const nextEvent = upcomingEvents[1];
                nextTitleEl.innerText = nextEvent.tag ? `【${nextEvent.tag}】${nextEvent.title}` : nextEvent.title;
                const nextDatePrefix = isToday(nextEvent.date) ? '今日 ' : new Date(nextEvent.date).toLocaleDateString('zh-TW', {month:'short', day:'numeric'}) + ' ';
                nextTimeEl.innerText = nextDatePrefix + formatAMPM(nextEvent.time);
            } else {
                nextTitleEl.innerText = "無後續安排";
                nextTimeEl.innerText = "--";
            }
        }

        window.formatDiffDash = function(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const days = Math.floor(totalSeconds / (3600 * 24));
            const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const h = String(hours).padStart(2, '0');
            const m = String(minutes).padStart(2, '0');
            const s = String(seconds).padStart(2, '0');
            if (days > 0) return `${days}天 ${h}:${m}:${s}`;
            return `${h}:${m}:${s}`;
        }

        window.onload = () => {
            const font = localStorage.getItem('chim_app_font') || 'sans';
            const bgColor = localStorage.getItem('chim_app_bg') || '#F2F2F7';
            const headColor = localStorage.getItem('chim_app_header') || 'bg-appbg/70';
            
            window.applyFont(font);
            window.applyBgColor(bgColor, headColor);
            window.updateAllViews();
        };
    </script>
</body>
</html>
